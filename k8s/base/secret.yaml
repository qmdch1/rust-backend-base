# ============================================================
# TEMPLATE ONLY - DO NOT COMMIT REAL SECRETS
# Replace values below before deploying.
# For production, use Sealed Secrets or External Secrets Operator.
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: rust-backend-secret
  namespace: rust-backend
type: Opaque
stringData:
  DATABASE_URL: "postgres://<DB_USER>:<DB_PASSWORD>@postgres-service:5432/rust_backend"
  REDIS_URL: "redis://valkey-service:6379"
  JWT_SECRET: "<GENERATE: openssl rand -base64 32>"
  JWT_ACCESS_TOKEN_EXPIRY_SECS: "3600"
  JWT_REFRESH_TOKEN_EXPIRY_SECS: "604800"
