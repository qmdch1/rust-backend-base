apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rust-backend

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - postgres.yaml
  - valkey.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml

commonLabels:
  app.kubernetes.io/part-of: rust-backend
  app.kubernetes.io/managed-by: kustomize
