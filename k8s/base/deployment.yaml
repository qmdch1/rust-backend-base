apiVersion: apps/v1
kind: Deployment
metadata:
  name: rust-backend
  namespace: rust-backend
  labels:
    app.kubernetes.io/name: rust-backend
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: rust-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rust-backend
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: rust-backend
          image: rust-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - secretRef:
                name: rust-backend-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
      restartPolicy: Always
