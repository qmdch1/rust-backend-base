apiVersion: v1
kind: ConfigMap
metadata:
  name: rust-backend-config
  namespace: rust-backend
data:
  RUST_ENV: "production"
  SERVER_HOST: "0.0.0.0"
  SERVER_PORT: "8080"
  DATABASE_MAX_CONNECTIONS: "10"
  DATABASE_MIN_CONNECTIONS: "2"
  CORS_ALLOWED_ORIGINS: "https://yourdomain.com"
  RUST_LOG: "rust_backend_base=info,tower_http=info"
