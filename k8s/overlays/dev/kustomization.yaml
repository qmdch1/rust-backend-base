apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rust-backend-dev

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: rust-backend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 50m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 64Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 200m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 128Mi
  - target:
      kind: HorizontalPodAutoscaler
      name: rust-backend-hpa
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3
  - target:
      kind: ConfigMap
      name: rust-backend-config
    patch: |
      - op: replace
        path: /data/RUST_ENV
        value: development
      - op: replace
        path: /data/RUST_LOG
        value: rust_backend_base=debug,tower_http=debug
      - op: replace
        path: /data/CORS_ALLOWED_ORIGINS
        value: http://localhost:3000
  - target:
      kind: Ingress
      name: rust-backend-ingress
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: api-dev.yourdomain.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: api-dev.yourdomain.com
